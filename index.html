<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Card Estilizado</title> 
        <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="card">
        <img src="css_livro.jpg" alt="Imagem do Produto" class="card-imagem">
        <h2 class="card-titulo">Produto Premium</h2>
        <p class="card-descricao">Este é um produto de alta qualidade com excelente custo benefício</p>
        <button class="card-botao">Comprar Agora</button>
    </div>
</body>
</html>
